<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06070c" />
    <title>Benzo: under construction</title>
    <meta name="description" content="This door isn't open yet. Benzo is still building it." />
    <meta name="robots" content="noindex" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'%3E%3Cpath fill='%237342E2' d='M 64 128 L 64.5 128 L 32 95 L 0 64 L 0 0 L 64 0 L 128 64 L 128 64.5 L 161 32 L 192 0 L 256 0 L 256 64 L 192 128 L 128 128 L 128 192 L 96 223 L 63.5 256 L 0 256 L 0 192 Z M 256 192 L 224 223 L 191.5 256 L 128 256 L 128 192 L 192 128 L 256 128 Z'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* pulled from the film: near-black night, cream light, flower periwinkle */
        --night: #06070c;
        --cream: #f2f0e9;
        --periwinkle: #a9a4ef;
        --dim: rgba(242, 240, 233, 0.62);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: "Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;
        background: var(--night);
        color: var(--cream);
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }
      .bg,
      .bg video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .bg video {
        object-fit: cover;
      }
      .bg .scrim {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(6, 7, 12, 0.55) 0%, transparent 26%, transparent 55%, rgba(6, 7, 12, 0.82) 100%);
      }

      .brand {
        position: fixed;
        top: 26px;
        left: 28px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--cream);
        text-decoration: none;
      }
      .brand svg {
        width: 26px;
        height: 26px;
        fill: currentColor;
      }
      .brand span {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.025em;
      }

      main {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        text-align: center;
        padding: 0 22px calc(46px + env(safe-area-inset-bottom));
        gap: 14px;
      }
      .kicker {
        font-size: 11.5px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        font-weight: 700;
        color: var(--periwinkle);
      }
      h1 {
        margin: 0;
        font-size: clamp(40px, 6vw, 84px);
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1;
        font-synthesis: none;
      }
      .sub {
        margin: 2px 0 0;
        max-width: 44ch;
        font-size: 15.5px;
        line-height: 1.6;
        font-weight: 500;
        color: var(--dim);
      }
      .back {
        margin-top: 16px;
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: var(--cream);
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
        border: 1.5px solid rgba(242, 240, 233, 0.35);
        border-radius: 999px;
        padding: 12px 22px;
        transition: border-color 0.25s ease, background-color 0.25s ease;
      }
      .back:hover {
        border-color: rgba(242, 240, 233, 0.75);
        background: rgba(242, 240, 233, 0.06);
      }
      .back .arrow {
        transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .back:hover .arrow {
        transform: translateX(-4px);
      }
      .status {
        margin-top: 8px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 600;
        color: rgba(242, 240, 233, 0.45);
      }
      .status .dot {
        width: 5px;
        height: 5px;
        border-radius: 999px;
        background: #63c78f;
      }
      @media (prefers-reduced-motion: reduce) {
        .back,
        .back .arrow {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <video src="/media/construction.mp4" poster="/media/construction-poster.jpg" autoplay loop muted playsinline preload="auto"></video>
      <div class="scrim"></div>
    </div>

    <a class="brand" href="/" aria-label="Back to Benzo">
      <svg viewBox="0 0 256 256" aria-hidden="true">
        <path d="M 64 128 L 64.5 128 L 32 95 L 0 64 L 0 0 L 64 0 L 128 64 L 128 64.5 L 161 32 L 192 0 L 256 0 L 256 64 L 192 128 L 128 128 L 128 192 L 96 223 L 63.5 256 L 0 256 L 0 192 Z M 256 192 L 224 223 L 191.5 256 L 128 256 L 128 192 L 192 128 L 256 128 Z" />
      </svg>
      <span>Benzo</span>
    </a>

    <main>
      <p class="kicker" id="kicker">Benzo</p>
      <h1>Under construction.</h1>
      <p class="sub">
        This door isn't open yet. We're taking our time with it, since everything behind it stays
        private.
      </p>
      <a class="back" href="/"><span class="arrow" aria-hidden="true">←</span> Back to the field</a>
      <p class="status"><span class="dot"></span> Live on Stellar testnet</p>
    </main>

    <script>
      var door = new URLSearchParams(location.search).get("door");
      var kicker = document.getElementById("kicker");
      if (door === "wallet") kicker.textContent = "Personal wallet";
      if (door === "console") kicker.textContent = "Business console";
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        var v = document.querySelector("video");
        v.removeAttribute("autoplay");
        v.pause();
      }
    </script>
  </body>
</html>
